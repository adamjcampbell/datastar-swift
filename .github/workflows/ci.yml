name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Swift 6.2+)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (Swift 6.2+)
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  constants-parity:
    name: Constants regeneration is up-to-date
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate constants
        run: swift Scripts/generate-constants.swift
      - name: Fail if regenerated output drifted
        run: |
          if ! git diff --exit-code; then
            echo "::error::Constants.swift is out of date. Run: swift Scripts/generate-constants.swift"
            exit 1
          fi
